apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: apm
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: '__K8S_CLUSTER_NAME__'
        replica: 'prometheus-0'

    # Remote write receiver configuration
    # Prometheus will receive remote write data from coroot-node-agent and coroot
    # on endpoint: /api/v1/write (enabled with --web.enable-remote-write-receiver)

    # Forward all metrics (including received remote write) to Fluent Bit
    remote_write:
      - url: __FLUENTBIT_ENDPOINT__
        write_relabel_configs:
          # Forward all metrics
          - source_labels: [__name__]
            separator: ;
            regex: kube_endpoint_address|kube_service_info|kube_pod_info|kube_pod_container_info|container.*|node.*|up|ip_to_fqdn
            replacement: $1
            action: keep
          - separator: ;
            target_label: technologyCategoryId
            replacement: __technologyCategoryId__
            action: replace
          - separator: ;
            target_label: CloudXP_CustomerID
            replacement: "__CloudXP_CustomerID__"
            action: replace
          - source_labels: [instance_type]
            target_label: cluster_name
            regex: (.+)
            replacement: $1
            action: replace
        # Retry configuration
        queue_config:
          max_samples_per_send: 1000
          batch_send_deadline: 5s
          min_backoff: 30ms
          max_backoff: 100ms
          capacity: 10000
          max_shards: 50
          min_shards: 1

    # Scrape configs (optional - for any local metrics)
    # Note: coroot-cluster-agent sends data to Coroot via HTTP POST
    # Coroot then writes metrics to Prometheus via remote write
    # Prometheus should NOT scrape the cluster agent directly
    # The kube_* metrics come through Coroot's remote write to Prometheus
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
