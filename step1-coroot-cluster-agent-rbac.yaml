apiVersion: v1
kind: Secret
metadata:
  name: __PULL_SECRET_NAME__
  namespace: apm
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "__IMAGE_REPO__": {
          "username": "__NEXUS_USERNAME__",
          "password": "__NEXUS_PASSWORD__",
          "auth": "__NEXUS_AUTH__"
        }
      }
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: coroot-cluster-agent
  namespace: apm
  labels:
    app: coroot-cluster-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: coroot-cluster-agent
  labels:
    app: coroot-cluster-agent
rules:
  # Required for collecting kube_* metrics
  - apiGroups: [""]
    resources:
      - pods
      - nodes
      - namespaces
      - endpoints
      - services
      - configmaps
      - events
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources:
      - deployments
      - replicasets
    verbs: ["get", "list", "watch"]
  # Additional resources that may be needed
  - apiGroups: [""]
    resources:
      - persistentvolumes
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
    verbs: ["get", "list", "watch"]
  # Required for kube-state-metrics CustomResourceConfig (e.g. FluxCD); CRDs are in apiextensions.k8s.io
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: coroot-cluster-agent
  labels:
    app: coroot-cluster-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: coroot-cluster-agent
subjects:
  - kind: ServiceAccount
    name: coroot-cluster-agent
    namespace: apm
